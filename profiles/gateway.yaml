name: gateway
components:
  - id: main
    capabilities:
      - id: refresh
        version: 1
    categories:
      - name: Others
preferences:
  - name: host
    title: Bridge Host
    description: TCP-RS485 bridge IP address or hostname
    required: false
    preferenceType: string
    definition:
      stringType: text
      minLength: 0
      maxLength: 128
      default: ''
  - name: port
    title: Bridge Port
    description: TCP-RS485 bridge port
    required: false
    preferenceType: integer
    definition:
      minimum: 1
      maximum: 65535
      default: 8899
  - name: protocolPreset
    title: Protocol Preset
    description: Built-in protocol preset key
    required: false
    preferenceType: string
    definition:
      stringType: text
      minLength: 0
      maxLength: 64
      default: kocom-default
  - name: deviceCodeOverrides
    title: Device Code Overrides
    description: Device code override JSON
    required: false
    preferenceType: string
    definition:
      stringType: text
      minLength: 0
      maxLength: 255
      default: '{}'
  - name: commandOverrides
    title: Command Overrides
    description: Raw packet command override JSON
    required: false
    preferenceType: string
    definition:
      stringType: text
      minLength: 0
      maxLength: 255
      default: '{}'
  - name: debugUnknownFrames
    title: Debug Unknown Frames
    description: Enable logs for unknown frames
    required: false
    preferenceType: boolean
    definition:
      default: false
  - name: captureSpecialFrames
    title: Capture Special Frames
    description: Enable capture logs for special feature frames
    required: false
    preferenceType: boolean
    definition:
      default: false
